<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 Dead End Drive — Murder Mystery</title>
  <meta name="description" content="13 Dead End Drive: An immersive 3D digital adaptation of the classic murder mystery board game. 2–4 players, real-time 3D mansion gameplay.">

  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Minimal base reset — Tailwind takes over via style.css loaded by main.tsx */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: hsl(220, 20%, 5%);
    }
    /* Loading spinner shown before React mounts */
    #pre-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: hsl(220, 20%, 5%);
      z-index: 9999;
      font-family: 'Outfit', sans-serif;
      color: hsl(220, 8%, 60%);
      transition: opacity 0.4s;
    }
    #pre-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-icon {
      font-size: 3.5rem;
      animation: float-pre 3s ease-in-out infinite;
    }
    .loader-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, hsl(45,95%,70%), hsl(30,90%,55%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loader-sub { font-size: 0.75rem; letter-spacing: 0.1em; opacity: 0.6; }
    .loader-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: hsl(45,95%,55%);
      margin: 0 3px;
      animation: dot-pulse 1.4s infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes float-pre {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes dot-pulse {
      0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
      40%         { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <!-- Pre-loader shown before React hydrates -->
  <div id="pre-loader">
    <div class="loader-icon">🏚️</div>
    <div class="loader-title">13 DEAD END DRIVE</div>
    <div class="loader-sub">Loading the mansion…</div>
    <div class="loader-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React App entry point -->
  <script type="module" src="/src/client/main.tsx"></script>

  <!-- Hide pre-loader once React starts -->
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('pre-loader');
      if (loader) {
        setTimeout(() => loader.classList.add('hidden'), 200);
        setTimeout(() => loader.remove(), 700);
      }
    });
  </script>
</body>
</html>
