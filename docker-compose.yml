# Full stack: client (nginx) + game-server + bot-ai
# Usage: docker compose up --build
# Play at http://localhost:8080  (Colyseus WS: ws://localhost:2567)

services:
  bot-ai:
    build: ./services/bot-ai
    ports:
      - "8000:8000"
    environment:
      LLM_ENABLED: ${LLM_ENABLED:-false}
      BOT_DIFFICULTY_DEFAULT: ${BOT_DIFFICULTY_DEFAULT:-NORMAL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    ports:
      - "2567:2567"
    environment:
      PORT: ${PORT:-2567}
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      BOT_AI_URL: ${BOT_AI_URL:-http://bot-ai:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      bot-ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:2567/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
      args:
        VITE_BOT_SERVICE_URL: ${VITE_BOT_SERVICE_URL:-/bot-api}
        VITE_LOBBY_API_URL: ${VITE_LOBBY_API_URL:-/lobby-api}
        VITE_COLYSEUS_URL: ${VITE_COLYSEUS_URL:-ws://localhost:2567}
        VITE_ONLINE_MULTIPLAYER: ${VITE_ONLINE_MULTIPLAYER:-true}
    ports:
      - "8080:80"
    depends_on:
      game-server:
        condition: service_healthy
      bot-ai:
        condition: service_healthy
